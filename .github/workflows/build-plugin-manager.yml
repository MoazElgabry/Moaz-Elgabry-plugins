name: Build Moaz Elgabry Plugins

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/**"
      - "docs/updates/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - ".gitignore"
      - "README.md"
      - ".github/workflows/build-plugin-manager.yml"

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      should_build: ${{ steps.release_guard.outputs.should_build }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Resolve app version
        id: version
        run: |
          echo "app_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Remove stale draft release for this version
        id: release_guard
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          $tag = "plugin-manager-v$env:APP_VERSION"
          $releaseJson = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$tag" 2>$null
          if (-not $releaseJson) {
            Write-Host "No existing release found for $tag"
            "should_build=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $release = $releaseJson | ConvertFrom-Json
          if (-not $release.draft) {
            Write-Host "A published release already exists for $tag. Skipping release build."
            "should_build=false" >> $env:GITHUB_OUTPUT
            "Release build skipped because $tag is already published." >> $env:GITHUB_STEP_SUMMARY
            exit 0
          }

          Write-Host "Deleting stale draft release $tag (id=$($release.id))"
          gh api --method DELETE "repos/$env:GITHUB_REPOSITORY/releases/$($release.id)"

          $tagRef = "repos/$env:GITHUB_REPOSITORY/git/refs/tags/$tag"
          gh api --method DELETE $tagRef 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No stale git tag ref to delete for $tag"
          }
          "should_build=true" >> $env:GITHUB_OUTPUT

  build:
    needs: prepare_release
    if: needs.prepare_release.outputs.should_build == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles app,dmg"
          - platform: ubuntu-latest
            args: "--bundles appimage"
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: "package-lock.json"

      - name: Install frontend dependencies
        run: npm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Build and draft release
        uses: tauri-apps/tauri-action@action-v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: "."
          tagName: plugin-manager-v__VERSION__
          releaseName: Moaz Elgabry Plugins v__VERSION__
          releaseBody: See the release assets for desktop build artifacts.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Windows workflow artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: moaz-elgabry-plugins-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error

      - name: Upload macOS workflow artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v6
        with:
          name: moaz-elgabry-plugins-${{ matrix.platform }}
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

      - name: Upload Linux workflow artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: moaz-elgabry-plugins-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: error
