name: Deploy Plugin Manager Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy-plugin-manager-pages.yml"
  release:
    types:
      - published

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: plugin-manager-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Generate plugin channel manifests from latest plugin releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tmp/releases tmp/configs
          curl -fsSL \
            -H "Accept: application/vnd.github.raw" \
            "https://raw.githubusercontent.com/MoazElgabry/Chromaspace/main/manager-release-config.json" \
            -o tmp/configs/chromaspace-manager-release-config.json
          curl -fsSL \
            -H "Accept: application/vnd.github.raw" \
            "https://raw.githubusercontent.com/MoazElgabry/ME_OpenDRT-OFX/main/manager-release-config.json" \
            -o tmp/configs/me-opendrt-manager-release-config.json
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/MoazElgabry/Chromaspace/releases?per_page=100" \
            -o tmp/releases/chromaspace-releases.json
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/MoazElgabry/ME_OpenDRT-OFX/releases?per_page=100" \
            -o tmp/releases/me-opendrt-releases.json
          node tools/generate-plugin-channel-manifests.mjs \
            --manager-root "$GITHUB_WORKSPACE" \
            --config "$GITHUB_WORKSPACE/tmp/configs/chromaspace-manager-release-config.json" \
            --releases-json "$GITHUB_WORKSPACE/tmp/releases/chromaspace-releases.json" \
            --config "$GITHUB_WORKSPACE/tmp/configs/me-opendrt-manager-release-config.json" \
            --releases-json "$GITHUB_WORKSPACE/tmp/releases/me-opendrt-releases.json"

      - name: Prepare Pages content
        run: |
          rm -rf pages-dist
          cp -R docs pages-dist

      - name: Generate updater feed from latest manager release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          node tools/generate-updater-feed.mjs --output pages-dist/updates/latest.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "pages-dist"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
